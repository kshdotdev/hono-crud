name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hono_crud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    # DATABASE_URL is scoped to the Postgres-backed step (not job-wide) so the
    # unit-test step's conformance run skips the prisma leg instead of hitting
    # a database that prisma:push hasn't prepared yet.
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm -r build

      - name: Type check
        run: pnpm -r typecheck

      - name: Type check examples
        run: pnpm run typecheck:examples

      - name: Unit tests
        run: pnpm run test:unit

      - name: Example + conformance tests (Postgres)
        run: pnpm run test:examples
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hono_crud?schema=public

      - name: Workers tests (miniflare)
        run: pnpm run test:workers

      - name: Local consumer smoke
        run: pnpm run example:local
